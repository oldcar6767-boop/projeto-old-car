<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Senha</title>
    <link rel="stylesheet" href="css-old-car/novasenha.css">
    <script src="js-old-car/novasenha.js"></script>
</head>
<body>

<div class="container">
    <h1>Digite a Nova Senha</h1>
    <form id="formNovaSenha" action="#" method="POST">
        <div class="form-grid">
            <div class="form-group full-width">
                <label for="novasenha">Nova Senha</label>
                <div class="password-wrapper">
                    <input type="password" id="novasenha" name="novasenha" placeholder="Nova Senha" required minlength="6">
                    <span class="toggle-password" data-target="novasenha" role="button" tabindex="0">Mostrar</span>
                </div>
            </div>
            <br>
      <div class="form-group full-width">
                <label for="confirmarNovasenha">Confirme a Nova Senha</label>
                <div class="password-wrapper">
                    <input type="password" id="confirmarNovasenha" name="confirmarNovasenha" placeholder="Confirme a Nova Senha" required minlength="6">
                    <span class="toggle-password" data-target="confirmarNovasenha" role="button" tabindex="0">Mostrar</span>
                </div>
            </div>
            <br>
            </div>
            <button type="submit" id="btnEntrar">Entrar</button>
    </form>
</div>
</body>
</html>
